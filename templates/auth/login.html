<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Dwaraka Mess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-bg">
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-icon">🍛</span>
      <h1 class="auth-title">Dwaraka Mess</h1>
      <p class="auth-subtitle">Your daily meal, managed with care</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="form-floating mb-3">
        <input type="tel" class="form-control auth-input" id="phone" name="phone"
               placeholder="Phone Number" required maxlength="10" />
        <label for="phone"><i class="bi bi-phone-fill me-2"></i>Phone Number</label>
      </div>
      <div class="form-floating mb-4">
        <input type="password" class="form-control auth-input" id="password" name="password"
               placeholder="Password" required />
        <label for="password"><i class="bi bi-lock-fill me-2"></i>Password</label>
      </div>
      <button type="submit" class="btn btn-gold w-100 auth-btn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>

    <div class="auth-footer">
      <p>New student? <a href="{{ url_for('auth.register') }}" class="auth-link">Register here</a></p>
    </div>


  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
