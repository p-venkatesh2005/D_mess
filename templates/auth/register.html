<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Dwaraka Mess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-bg">
<div class="auth-wrapper">
  <div class="auth-card auth-card-wide">
    <div class="auth-brand">
      <span class="auth-icon">🍛</span>
      <h1 class="auth-title">Join Dwaraka Mess</h1>
      <p class="auth-subtitle">Register as a new student</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-floating">
            <input type="text" class="form-control auth-input" id="name" name="name"
                   placeholder="Full Name" required minlength="2" maxlength="100" />
            <label for="name"><i class="bi bi-person-fill me-2"></i>Full Name</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="tel" class="form-control auth-input" id="phone" name="phone"
                   placeholder="Phone Number" required maxlength="10" pattern="[6-9][0-9]{9}" />
            <label for="phone"><i class="bi bi-phone-fill me-2"></i>Phone Number</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="email" class="form-control auth-input" id="email" name="email"
                   placeholder="Email (optional)" maxlength="120" />
            <label for="email"><i class="bi bi-envelope-fill me-2"></i>Email (Optional)</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="text" class="form-control auth-input" id="room_number" name="room_number"
                   placeholder="Room Number" maxlength="20" />
            <label for="room_number"><i class="bi bi-door-open-fill me-2"></i>Room Number</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="password" class="form-control auth-input" id="password" name="password"
                   placeholder="Password" required minlength="6" />
            <label for="password"><i class="bi bi-lock-fill me-2"></i>Password (min 6 chars)</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input type="password" class="form-control auth-input" id="confirm_password" name="confirm_password"
                   placeholder="Confirm Password" required minlength="6" />
            <label for="confirm_password"><i class="bi bi-lock-fill me-2"></i>Confirm Password</label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-gold w-100 auth-btn mt-4">
        <i class="bi bi-person-plus-fill me-2"></i>Create Account
      </button>
    </form>
    <div class="auth-footer">
      <p>Already registered? <a href="{{ url_for('auth.login') }}" class="auth-link">Login here</a></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
